<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

input{
width:100%;
padding:10px;
margin-top:8px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
}

</style>
</head>

<body>

<div class="card">

<img id="photo">

<h2 id="name"></h2>

<p id="job"></p>

<input id="newName" placeholder="Update name">

<input id="newJob" placeholder="Update occupation">

<input type="file" id="newPhoto">

<button onclick="updateProfile()">Save</button>

<button onclick="location='employee.html'">Back</button>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
authDomain:"iron-companies.firebaseapp.com",
projectId:"iron-companies",
storageBucket:"iron-companies.firebasestorage.app",
messagingSenderId:"692492696732",
appId:"1:692492696732:web:cd29fc124ddc0fa014c159"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const storage=firebase.storage();

firebase.auth().signInAnonymously();

let uid;

firebase.auth().onAuthStateChanged(async user=>{

uid=new URLSearchParams(location.search).get("uid")||user.uid;

const snap=await db.collection("users").doc(uid).get();

const data=snap.data();

document.getElementById("photo").src=data.photo||"";
document.getElementById("name").innerText=data.username;
document.getElementById("job").innerText=data.occupation;

});

async function updateProfile(){

const user=firebase.auth().currentUser;

if(user.uid!==uid) return;

const name=document.getElementById("newName").value;
const job=document.getElementById("newJob").value;
const file=document.getElementById("newPhoto").files[0];

let photoURL=null;

if(file){

const ref=storage.ref("profileImages/"+uid);

await ref.put(file);

photoURL=await ref.getDownloadURL();

}

await db.collection("users").doc(uid).set({
username:name,
occupation:job,
photo:photoURL
},{merge:true});

alert("Updated");

location.reload();

}

</script>

</body>
</html>
