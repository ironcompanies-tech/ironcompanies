<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#0f1c4d,#020617 70%);
color:#00eaff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#0b1330;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 25px #00eaff33;
}

img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:3px solid #00eaff;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #00eaff55;
background:#020617;
color:#00eaff;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00eaff,#00bcd4);
color:black;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Update Profile</h2>

<img id="preview" src="">

<input type="file" id="imageInput">

<input id="name" placeholder="Your Name">

<input id="occupation" placeholder="Occupation">

<button onclick="saveProfile()">Save Profile</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
authDomain:"iron-companies.firebaseapp.com",
projectId:"iron-companies",
storageBucket:"iron-companies.firebasestorage.app",
messagingSenderId:"692492696732",
appId:"1:692492696732:web:cd29fc124ddc0fa014c159"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let uid=null;
let imageBase64=null;

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location.href="index.html";
return;
}

uid=user.uid;

const docRef=doc(db,"users",uid);
const snap=await getDoc(docRef);

if(snap.exists()){

const data=snap.data();

document.getElementById("name").value=data.name || "";
document.getElementById("occupation").value=data.occupation || "";

if(data.photo){
document.getElementById("preview").src=data.photo;
}

}

});

document.getElementById("imageInput").addEventListener("change",async(e)=>{

const file=e.target.files[0];

if(!file) return;

const img=new Image();
const reader=new FileReader();

reader.onload=function(event){
img.src=event.target.result;
}

img.onload=function(){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const maxSize=300;

let width=img.width;
let height=img.height;

if(width>height){
if(width>maxSize){
height*=maxSize/width;
width=maxSize;
}
}else{
if(height>maxSize){
width*=maxSize/height;
height=maxSize;
}
}

canvas.width=width;
canvas.height=height;

ctx.drawImage(img,0,0,width,height);

imageBase64=canvas.toDataURL("image/jpeg",0.7);

document.getElementById("preview").src=imageBase64;

};

reader.readAsDataURL(file);

});

window.saveProfile=async()=>{

if(!uid) return;

await updateDoc(doc(db,"users",uid),{

name:document.getElementById("name").value,
occupation:document.getElementById("occupation").value,
photo:imageBase64 || null

});

alert("Profile updated");

};

</script>

</body>
</html>
