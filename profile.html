<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>
body{
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
width:320px;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

input{
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<h2 id="username"></h2>

<p id="occupation"></p>

<div id="editArea" style="display:none">

<input type="file" id="picInput" accept="image/*">

<button onclick="uploadPic()">Update Picture</button>

</div>

<br>

<button onclick="goBack()">Back</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
authDomain:"iron-companies.firebaseapp.com",
projectId:"iron-companies",
storageBucket:"iron-companies.firebasestorage.app",
messagingSenderId:"692492696732",
appId:"1:692492696732:web:cd29fc124ddc0fa014c159"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const params=new URLSearchParams(window.location.search);
const uid=params.get("uid") || auth.currentUser?.uid;

let profileOwner=false;

async function loadProfile(){

const snap=await getDoc(doc(db,"users",uid));

if(!snap.exists()) return;

const data=snap.data();

document.getElementById("username").innerText=data.username;
document.getElementById("occupation").innerText=data.occupation || "";

if(data.profilePic){
document.getElementById("profilePic").src=data.profilePic;
}

if(auth.currentUser && auth.currentUser.uid===uid){
profileOwner=true;
document.getElementById("editArea").style.display="block";
}

}

function compressImage(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.readAsDataURL(file);

reader.onload=e=>{

const img=new Image();
img.src=e.target.result;

img.onload=()=>{

const canvas=document.createElement("canvas");

const maxWidth=500;
const scale=maxWidth/img.width;

canvas.width=maxWidth;
canvas.height=img.height*scale;

const ctx=canvas.getContext("2d");
ctx.drawImage(img,0,0,canvas.width,canvas.height);

resolve(canvas.toDataURL("image/jpeg",0.7));

};

};

});

}

window.uploadPic=async()=>{

if(!profileOwner) return;

const file=document.getElementById("picInput").files[0];

if(!file) return alert("Select image");

const img=await compressImage(file);

await updateDoc(doc(db,"users",uid),{
profilePic:img
});

alert("Profile picture updated");

location.reload();

};

window.goBack=()=>{
history.back();
};

loadProfile();

</script>

</body>
</html>
