<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Companies</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#2563eb;
  --accent2:#38bdf8;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.screen{
  display:none;
  width:100%;
  max-width:500px;
  padding:20px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
}

.portal-buttons{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.portal-btn{
  width:150px;
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Chat */
#chatApp{
  display:none;
  flex-direction:column;
  width:100%;
  height:100vh;
}

header{
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#0f172a;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.message{
  background:var(--card);
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.username{
  font-size:0.8rem;
  color:var(--muted);
  margin-bottom:5px;
}

.chat-img{
  max-width:100%;
  border-radius:10px;
  margin-top:8px;
}

.view-btn{
  margin-top:6px;
  font-size:0.7rem;
  padding:4px 8px;
}

#inputArea{
  display:flex;
  padding:10px;
  gap:8px;
}

#messageInput{
  flex:1;
}

#imageInput{
  display:none;
}

#imageLabel{
  font-size:22px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- PROFILE CREATION -->
<div id="profileScreen" class="screen">
  <h2>Create Profile</h2>
  <input type="text" id="profileName" placeholder="Your Name">
  <input type="text" id="profileOccupation" placeholder="Occupation">
  <button onclick="saveProfile()">Save</button>
</div>

<!-- PORTAL -->
<div id="portalScreen" class="screen">
  <h2>Welcome</h2>
  <br>
  <div class="portal-buttons">
    <button class="portal-btn" id="enterChatBtn">Join Chat</button>
    <button class="portal-btn" onclick="window.location.href='articles.html'">
      Articles
    </button>
  </div>
</div>

<!-- CHAT -->
<div id="chatApp">
  <header>
    <div id="welcome"></div>
    <button onclick="logout()">Logout</button>
  </header>

  <div id="messages"></div>

  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type message...">
    <label id="imageLabel" for="imageInput">📷</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc,
  doc, getDoc, setDoc,
  query, orderBy, onSnapshot,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
  authDomain: "iron-companies.firebaseapp.com",
  projectId: "iron-companies",
  storageBucket: "iron-companies.firebasestorage.app",
  messagingSenderId: "692492696732",
  appId: "1:692492696732:web:cd29fc124ddc0fa014c159"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

/* AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  currentUser=user;
  const snap=await getDoc(doc(db,"users",user.uid));

  if(!snap.exists()){
    showScreen("profileScreen");
  } else {
    userData=snap.data();
    showScreen("portalScreen");
  }
});

function showScreen(id){
  document.getElementById("profileScreen").style.display="none";
  document.getElementById("portalScreen").style.display="none";
  document.getElementById("chatApp").style.display="none";
  document.getElementById(id).style.display =
    id==="chatApp"?"flex":"block";
}

/* SAVE PROFILE */
window.saveProfile=async()=>{
  const name=document.getElementById("profileName").value.trim();
  const occupation=document.getElementById("profileOccupation").value.trim();
  if(!name) return alert("Enter name");

  await setDoc(doc(db,"users",currentUser.uid),{
    username:name,
    occupation:occupation||"",
    createdAt:new Date()
  });

  location.reload();
};

/* ENTER CHAT */
document.getElementById("enterChatBtn").onclick=()=>{
  showScreen("chatApp");
  document.getElementById("welcome").innerText =
    userData.username+" • "+(userData.occupation||"");
  loadMessages();
};

/* LOAD MESSAGES */
function loadMessages(){
  const q=query(collection(db,"messages"),orderBy("createdAt","asc"));
  onSnapshot(q,(snap)=>{
    const div=document.getElementById("messages");
    div.innerHTML="";
    snap.forEach(docSnap=>{
      const m=docSnap.data();
      div.innerHTML+=`
        <div class="message">
          <div class="username">${m.username}</div>
          ${m.text?`<div>${m.text}</div>`:""}
          ${m.image?`<img src="${m.image}" class="chat-img">`:""}
          ${m.uid?`
            <button class="view-btn"
              onclick="viewProfile('${m.uid}')">
              View Profile
            </button>
          `:""}
        </div>
      `;
    });
  });
}

/* IMAGE COMPRESSION */
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const maxWidth=800;
        const scale=maxWidth/img.width;
        canvas.width=maxWidth;
        canvas.height=img.height*scale;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.6));
      };
    };
  });
}

/* SEND MESSAGE */
window.sendMessage=async()=>{
  const text=document.getElementById("messageInput").value.trim();
  const imageFile=document.getElementById("imageInput").files[0];
  if(!text && !imageFile) return;

  let imageData=null;
  if(imageFile){
    imageData=await compressImage(imageFile);
  }

  await addDoc(collection(db,"messages"),{
    username:userData.username,
    uid:currentUser.uid,
    text:text||null,
    image:imageData||null,
    createdAt:serverTimestamp()
  });

  document.getElementById("messageInput").value="";
  document.getElementById("imageInput").value="";
};

/* VIEW PROFILE */
window.viewProfile=(uid)=>{
  window.location.href="profile.html?uid="+uid;
};

window.logout=async()=>{
  await signOut(auth);
  window.location.href="index.html";
};
</script>

</body>
</html>
