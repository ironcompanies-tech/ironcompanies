<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Companies - Employee</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#2563eb;
  --accent2:#38bdf8;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Portal */
#portal{
  text-align:center;
}

#enterBtn{
  width:230px;
  height:230px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:18px;
  font-size:1.4rem;
  font-weight:bold;
  color:white;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  box-shadow:0 0 40px #2563eb55;
}

#enterBtn:hover{
  transform:scale(1.08);
}

/* Chat */
#chatApp{
  display:none;
  flex-direction:column;
  width:100%;
  height:100%;
}

header{
  padding:15px 20px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #334155;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  background:var(--card);
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
}

.username{
  font-size:0.8rem;
  color:var(--muted);
  margin-bottom:6px;
}

img{
  max-width:200px;
  border-radius:10px;
  margin-top:8px;
}

#inputArea{
  display:flex;
  padding:12px;
  gap:8px;
  background:#0f172a;
}

input[type=text]{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:8px;
  font-size:0.75rem;
  color:var(--muted);
}
footer a{
  color:#38bdf8;
  text-decoration:none;
}
</style>
</head>
<body>

<div id="portal">
  <button id="enterBtn">ENTER CHAT</button>
</div>

<div id="chatApp">
  <header>
    <div id="welcome"></div>
    <button onclick="logout()">Logout</button>
  </header>

  <div id="messages"></div>

  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type message...">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="sendMessage()">Send</button>
  </div>

  <footer>
    <a href="privacy.html">Privacy Policy</a> |
    <a href="terms.html">Terms & Conditions</a>
  </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, doc,
  getDoc, setDoc, query, orderBy,
  onSnapshot, serverTimestamp, updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
  authDomain: "iron-companies.firebaseapp.com",
  projectId: "iron-companies",
  storageBucket: "iron-companies.firebasestorage.app",
  messagingSenderId: "692492696732",
  appId: "1:692492696732:web:cd29fc124ddc0fa014c159"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let userData=null;

/* Enter Chat */
document.getElementById("enterBtn").onclick=()=>{
  document.getElementById("portal").style.display="none";
  document.getElementById("chatApp").style.display="flex";
  loadMessages();
};

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  currentUser=user;
  const ref=doc(db,"users",user.uid);
  const snap=await getDoc(ref);

  if(snap.exists()){
    userData=snap.data();
  } else {
    const username="User"+Math.floor(Math.random()*9999);
    await setDoc(ref,{
      username:username,
      online:true,
      createdAt:new Date()
    });
    userData={username};
  }

  await updateDoc(ref,{online:true,lastSeen:serverTimestamp()});

  document.getElementById("welcome").innerText="Welcome "+userData.username;

  window.addEventListener("beforeunload",()=>{
    updateDoc(ref,{online:false,lastSeen:serverTimestamp()});
  });
});

/* Load Messages */
function loadMessages(){
  const q=query(collection(db,"messages"),orderBy("createdAt","asc"));
  onSnapshot(q,(snap)=>{
    const div=document.getElementById("messages");
    div.innerHTML="";
    snap.forEach(doc=>{
      const m=doc.data();
      div.innerHTML+=`
        <div class="message">
          <div class="username">${m.username}</div>
          ${m.text || ""}
          ${m.image ? `<img src="${m.image}">` : ""}
        </div>
      `;
    });
    div.scrollTop=div.scrollHeight;
  });
}

/* Image Compression */
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");
        const maxWidth=800;
        const scale=maxWidth/img.width;
        canvas.width=maxWidth;
        canvas.height=img.height*scale;
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.6));
      };
    };
  });
}

/* Send */
window.sendMessage=async ()=>{
  const text=document.getElementById("messageInput").value.trim();
  const file=document.getElementById("imageInput").files[0];
  let image=null;

  if(file){
    image=await compressImage(file);
  }

  if(!text && !image) return;

  await addDoc(collection(db,"messages"),{
    username:userData.username,
    text:text||"",
    image:image||null,
    createdAt:serverTimestamp()
  });

  document.getElementById("messageInput").value="";
  document.getElementById("imageInput").value="";
};

window.logout=async ()=>{
  await signOut(auth);
  window.location.href="index.html";
};
</script>
</body>
</html>
