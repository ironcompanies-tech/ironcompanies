<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Companies</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e293b;
  --accent:#2563eb;
  --accent2:#38bdf8;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}

body{
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Profile Setup */
#profileSetup{
  display:none;
  text-align:center;
}
#profileSetup input{
  padding:8px;
  margin:6px;
  border-radius:6px;
  border:none;
}

/* Portal */
#portal{
  text-align:center;
}
#enterBtn{
  width:220px;
  height:220px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-size:1.4rem;
  font-weight:bold;
  color:white;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 40px #2563eb55;
  transition:0.3s;
}
#enterBtn:hover{transform:scale(1.07);}

/* Chat */
#chatApp{
  display:none;
  flex-direction:column;
  width:100%;
  height:100%;
}
header{
  padding:12px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.message{
  background:var(--card);
  padding:10px;
  margin-bottom:10px;
  border-radius:12px;
}
.username{
  font-size:0.8rem;
  color:var(--muted);
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:8px;
}
.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

/* Input Area */
#inputArea{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background:#0f172a;
}
#messageInput{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* Image Icon Button */
#imageLabel{
  font-size:22px;
  cursor:pointer;
}
#imageInput{
  display:none;
}
button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
footer{
  text-align:center;
  font-size:0.75rem;
  padding:6px;
  color:var(--muted);
}
footer a{
  color:#38bdf8;
  text-decoration:none;
}
</style>
</head>
<body>

<div id="profileSetup">
  <h2>Create Profile</h2>
  <input type="text" id="profileName" placeholder="Your Name"><br>
  <input type="text" id="profileOccupation" placeholder="Occupation"><br>
  <input type="file" id="profileImage" accept="image/*"><br>
  <button onclick="saveProfile()">Save</button>
</div>

<div id="portal">
  <button id="enterBtn">ENTER CHAT</button>
</div>

<div id="chatApp">
  <header>
    <div id="welcome"></div>
    <button onclick="logout()">Logout</button>
  </header>

  <div id="messages"></div>

  <div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type message...">
    <label id="imageLabel" for="imageInput">📷</label>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="sendMessage()">Send</button>
  </div>

  <footer>
    <a href="privacy.html">Privacy Policy</a> |
    <a href="terms.html">Terms</a>
  </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, doc,
  getDoc, setDoc, query, orderBy,
  onSnapshot, serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
  authDomain: "iron-companies.firebaseapp.com",
  projectId: "iron-companies",
  storageBucket: "iron-companies.firebasestorage.app",
  messagingSenderId: "692492696732",
  appId: "1:692492696732:web:cd29fc124ddc0fa014c159"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

document.getElementById("enterBtn").onclick=()=>{
  document.getElementById("portal").style.display="none";
  document.getElementById("chatApp").style.display="flex";
  loadMessages();
};

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  currentUser=user;
  const ref=doc(db,"users",user.uid);
  const snap=await getDoc(ref);

  if(!snap.exists() || !snap.data().username){
    document.getElementById("profileSetup").style.display="block";
    return;
  }

  userData=snap.data();
  document.getElementById("welcome").innerText=
    userData.username+" • "+(userData.occupation||"");
});

/* Image Compression */
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=e=>{
      const img=new Image();
      img.src=e.target.result;
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const ctx=canvas.getContext("2d");
        const maxWidth=600;
        const scale=maxWidth/img.width;
        canvas.width=maxWidth;
        canvas.height=img.height*scale;
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.6));
      };
    };
  });
}

window.saveProfile=async()=>{
  const name=document.getElementById("profileName").value.trim();
  const occupation=document.getElementById("profileOccupation").value.trim();
  const file=document.getElementById("profileImage").files[0];

  if(!name) return;

  let profilePic=null;
  if(file) profilePic=await compressImage(file);

  await setDoc(doc(db,"users",currentUser.uid),{
    username:name,
    occupation:occupation||"",
    profilePic:profilePic||null,
    createdAt:new Date()
  });

  location.reload();
};

function loadMessages(){
  const q=query(collection(db,"messages"),orderBy("createdAt","asc"));
  onSnapshot(q,(snap)=>{
    const div=document.getElementById("messages");
    div.innerHTML="";
    snap.forEach(doc=>{
      const m=doc.data();
      div.innerHTML+=`
        <div class="message">
          <div class="username">
            ${m.profilePic ? `<img src="${m.profilePic}" class="avatar">` : ""}
            ${m.username}
          </div>
          ${m.text||""}
          ${m.image?`<img src="${m.image}">`:""}
        </div>
      `;
    });
    div.scrollTop=div.scrollHeight;
  });
}

window.sendMessage=async()=>{
  const text=document.getElementById("messageInput").value.trim();
  const file=document.getElementById("imageInput").files[0];

  let image=null;
  if(file) image=await compressImage(file);
  if(!text && !image) return;

  await addDoc(collection(db,"messages"),{
    username:userData.username,
    profilePic:userData.profilePic||null,
    text:text||"",
    image:image||null,
    createdAt:serverTimestamp()
  });

  document.getElementById("messageInput").value="";
  document.getElementById("imageInput").value="";
};

window.logout=async()=>{
  await signOut(auth);
  window.location.href="index.html";
};
</script>

</body>
</html>
