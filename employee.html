<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>

body{margin:0;font-family:Arial;background:#e6e6e6;}

header{
background:#111;
color:white;
display:flex;
align-items:center;
padding:10px;
}

#profileBtn img{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
margin-right:10px;
}

#articlesBtn{
margin-left:auto;
margin-right:10px;
cursor:pointer;
}

#chat{
height:70vh;
overflow-y:auto;
padding:10px;
}

.message{
display:flex;
align-items:flex-end;
margin:10px 0;
max-width:80%;
}

.left{flex-direction:row;}
.right{flex-direction:row-reverse;margin-left:auto;}

.bubble{
padding:10px;
border-radius:10px;
background:white;
}

.right .bubble{
background:#4CAF50;
color:white;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin:0 6px;
cursor:pointer;
}

.time{
font-size:10px;
opacity:0.7;
}

#inputArea{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
padding:10px;
}

#msg{flex:1;padding:10px;}

#send{width:70px;}

#imgInput{display:none;}

</style>
</head>

<body>

<header>

<div id="profileBtn">
<img id="myAvatar" src="">
</div>

<h3>Employee Chat</h3>

<div id="articlesBtn">Articles</div>

</header>

<div id="chat"></div>

<div id="inputArea">

<input id="msg" placeholder="Type message">

<button onclick="document.getElementById('imgInput').click()">📷</button>

<button id="send">Send</button>

<input type="file" id="imgInput">

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyD6c1k8BURliiSAwEOnT_HW1MaZjNhHJSM",
authDomain:"iron-companies.firebaseapp.com",
projectId:"iron-companies",
storageBucket:"iron-companies.firebasestorage.app",
messagingSenderId:"692492696732",
appId:"1:692492696732:web:cd29fc124ddc0fa014c159"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const storage=firebase.storage();

firebase.auth().signInAnonymously();

let currentUser;
let myData;

firebase.auth().onAuthStateChanged(async user=>{

currentUser=user;

const snap=await db.collection("users").doc(user.uid).get();

if(snap.exists){
myData=snap.data();
document.getElementById("myAvatar").src=myData.photo||"";
}

loadMessages();

});

document.getElementById("send").onclick=async()=>{

const text=document.getElementById("msg").value;

if(!text) return;

await db.collection("messages").add({
text:text,
uid:currentUser.uid,
username:myData.username,
photo:myData.photo||"",
time:Date.now()
});

document.getElementById("msg").value="";

};

document.getElementById("imgInput").addEventListener("change",async e=>{

const file=e.target.files[0];

const ref=storage.ref("chatImages/"+Date.now());

await ref.put(file);

const url=await ref.getDownloadURL();

await db.collection("messages").add({
image:url,
uid:currentUser.uid,
username:myData.username,
photo:myData.photo||"",
time:Date.now()
});

});

function loadMessages(){

db.collection("messages").orderBy("time")
.onSnapshot(snapshot=>{

const chat=document.getElementById("chat");

chat.innerHTML="";

snapshot.forEach(doc=>{

const m=doc.data();

const side=m.uid===currentUser.uid?"right":"left";

const div=document.createElement("div");
div.className="message "+side;

div.innerHTML=`
<img class="avatar" src="${m.photo}" onclick="viewProfile('${m.uid}')">

<div class="bubble">
<b>${m.username}</b><br>
${m.text?m.text:""}
${m.image?`<br><img src="${m.image}" width="150">`:""}
<div class="time">${new Date(m.time).toLocaleTimeString()}</div>
</div>
`;

chat.appendChild(div);

});

chat.scrollTop=chat.scrollHeight;

});

}

function viewProfile(uid){
window.location="profile.html?uid="+uid;
}

document.getElementById("profileBtn").onclick=()=>{
window.location="profile.html";
}

document.getElementById("articlesBtn").onclick=()=>{
window.location="articles.html";
}

</script>

</body>
</html>
