<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Companies Chat</title>

<style>

body{
font-family:Arial;
background:#f2f6ff;
margin:0;
}

header{
background:#4a6cf7;
color:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
}

#profileBtn{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
border:2px solid white;
}

#chatBox{
height:70vh;
overflow-y:auto;
padding:10px;
background:white;
}

.message{
max-width:60%;
padding:10px;
margin:8px;
border-radius:12px;
}

.me{
background:#4a6cf7;
color:white;
margin-left:auto;
text-align:right;
}

.other{
background:#e4e8ff;
color:black;
margin-right:auto;
}

#sendArea{
display:flex;
padding:10px;
background:#f7f7f7;
}

#messageInput{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-left:5px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#4a6cf7;
color:white;
cursor:pointer;
}

.bigButtons{
display:flex;
justify-content:center;
gap:20px;
margin:15px;
}

.bigBtn{
width:180px;
height:80px;
font-size:18px;
background:#6c85ff;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
}

footer{
text-align:center;
padding:10px;
font-size:14px;
}

footer a{
margin:10px;
text-decoration:none;
color:#4a6cf7;
}

</style>
</head>

<body>

<header>

<img id="profileBtn" src="default.png" onclick="window.location='profile.html'">

<div>Iron Companies Chat</div>

<div id="onlineIndicator">🟢 Online</div>

</header>

<div class="bigButtons">

<div class="bigBtn" onclick="openChat()">Join Chat</div>

<div class="bigBtn" onclick="window.location='articles.html'">Articles</div>

</div>

<div id="chatBox"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Type message">

<input type="file" id="imageInput">

<button onclick="sendMessage()">Send</button>

</div>

<footer>

<a href="privacy.html">Privacy Policy</a>

<a href="terms.html">Terms & Conditions</a>

</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {

apiKey:"YOUR_API",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_ID",
appId:"YOUR_APP"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


const chatBox = document.getElementById("chatBox");


window.sendMessage = async function(){

const text = document.getElementById("messageInput").value;
const file = document.getElementById("imageInput").files[0];

let imageURL = "";

if(file){

const reader = new FileReader();

reader.onload = async function(){

imageURL = reader.result;

await addDoc(collection(db,"messages"),{
text:text,
image:imageURL,
uid:auth.currentUser.uid,
time:Date.now()
});

};

reader.readAsDataURL(file);

}else{

await addDoc(collection(db,"messages"),{
text:text,
image:"",
uid:auth.currentUser.uid,
time:Date.now()
});

}

document.getElementById("messageInput").value="";

};


onSnapshot(collection(db,"messages"),(snapshot)=>{

chatBox.innerHTML="";

snapshot.forEach(doc=>{

const data = doc.data();

const div = document.createElement("div");

div.classList.add("message");

if(auth.currentUser && data.uid===auth.currentUser.uid){
div.classList.add("me");
}else{
div.classList.add("other");
}

div.innerHTML = `
<div>${data.text || ""}</div>
${data.image ? `<img src="${data.image}" style="max-width:200px;border-radius:10px;">` : ""}
`;

chatBox.appendChild(div);

});

chatBox.scrollTop = chatBox.scrollHeight;

});


window.openChat=function(){
document.getElementById("chatBox").scrollIntoView();
}

</script>

</body>
</html>
